    // blob URLs load and parent.location is writable).

    }

    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;

:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { now: new Date() };\n\n  componentDidMount(){\n    this._t = setInterval(()=>this.setState({ now: new Date() }), 30000);\n    this._waitL();\n  }\n  componentWillUnmount(){\n    clearInterval(this._t);\n    if(this._lt) clearTimeout(this._lt);\n    if(this._map){ this._map.remove(); this._map=null; }\n  }\n\n  // ---------- 12 real Houston Multi-Service Centers (true lat/lng) ----------\n  base(){\n    const N=(heat,shelter,food,medical,power,ride)=>({heat,shelter,food,medical,power,ride});\n    return [\n      {id:'acres',     name:'Acres Homes MSC',      short:'Acres Homes',  lat:29.8526, lng:-95.4360, byNeed:N(28,6,12,6,10,4),  sev:9,  wait:31, cap:92, staff:6,  served:40},\n      {id:'alief',     name:'Alief Neighborhood Ctr', short:'Alief',     lat:29.7046, lng:-95.5975, byNeed:N(26,8,18,6,5,8),   sev:9,  wait:27, cap:84, staff:6,  served:36},\n      {id:'denver',    name:'Denver Harbor MSC',    short:'Denver Harbor',lat:29.7820, lng:-95.3030, byNeed:N(14,5,10,7,6,4),  sev:6,  wait:20, cap:71, staff:6,  served:38},\n      {id:'fifth',     name:'Fifth Ward MSC',       short:'Fifth Ward',   lat:29.7720, lng:-95.3260, byNeed:N(15,7,11,8,6,4),  sev:7,  wait:22, cap:78, staff:7,  served:41},\n      {id:'hiram',     name:'Hiram Clarke MSC',     short:'Hiram Clarke', lat:29.6135, lng:-95.4470, byNeed:N(24,7,12,6,5,5),  sev:11, wait:29, cap:88, staff:5,  served:24},\n      {id:'kashmere',  name:'Kashmere MSC',         short:'Kashmere',     lat:29.8120, lng:-95.3320, byNeed:N(13,5,9,11,22,3), sev:10, wait:24, cap:90, staff:7,  served:36},\n      {id:'magnolia',  name:'Magnolia MSC',         short:'Magnolia',     lat:29.7430, lng:-95.3010, byNeed:N(15,6,18,6,5,6),  sev:6,  wait:21, cap:74, staff:6,  served:44},\n      {id:'northeast', name:'Northeast MSC',        short:'Northeast',    lat:29.8330, lng:-95.2940, byNeed:N(12,5,9,6,7,3),   sev:5,  wait:18, cap:66, staff:6,  served:34},\n      {id:'sout age response — Kashmere',\n        reason:'22 power + 11 medical cases clustered around Kashmere; oxygen-dependent residents flagged. Link utility ETA with 211.',\n        deltas:['10 red-flag cases','Put EMS / 988 on standby'], btn:'Open response', done:'Response opened', effect:{}},\n      {id:'r5',tier:'Medium',dist:'acres',title:'Surge cooling supplies to Acres Homes MSC',\n        reason:'Acres Homes is at 92% with water and cooling-kit stock low; 23 unmet and +10 power cases in the catchment.',\n        deltas:['Restock ~200 kits','Buys roughly 2 days'], btn:'Dispatch supplies', done:'Supplies sent', effect:{dist:'acres',addServed:12}},\n    ];\n  }\n\n  // ---------- color ----------\n  lerp(a,b,t){ return Math.round(a+(b-a)*t); }\n  ramp(t){\n    t=Math.max(0,Math.min(1,t));\n    const s=[[0,[90,140,74]],[0.4,[224,162,60]],[0.72,[213,105,74]],[1,[158,43,30]]];\n    for(let i=1;i<s.length;i++){ if(t<=s[i][0]){ const [t0,c0]=s[i-1],[t1,c1]=s[i]; const k=(t-t0)/((t1-t0)||1);\n      return [this.lerp(c0[0],c1[0],k),this.lerp(c0[1],c1[1],k),this.lerp(c0[2],c1[2],k)]; } }\n    return s[s.length-1][1];\n  }\n  rgba(c,a){ return 'rgba('+c[0]+','+c[1]+','+c[2]+','+a+')'; }\n  hex(c){ return '#'+c.map(x=>x.toString(16).padStart(2,'0')).join(''); }\n\n  // ---------- scenario / filters ----------\n  scn(){ return this.state.scenario ?? this.props.scenario ?? 'Extreme heat'; }\n  scenInfo(){\n    const m={\n      'Extreme heat':{icon:'🌡️',label:'Heat Advisory',sub:'108°F feels-like · code red',bg:'#FBEAE2',border:'#F0CDBE',ink:'#B23A28'},\n      'Power outage':{icon:'⚡',label:'Power Outage Event',sub:'412k without power · grid strain',bg:'#FCF1DC',border:'#EBD79E',ink:'#A06A12'},\n      'Multi-crisis':{icon:'🌀',label:'Multi-Crisis',sub:'Heat + outage overlap · code red',bg:'#FBEAE2',border:'#F0CDBE',ink:'#B23A28'},\n      'Normal week':{icon:'☀️',label:'Steady State',sub:'No active advisory',bg:'#E9F0E6',border:'#CADBC2',ink:'#4D7A3E'},\n    };\n    return m[this.scn()]||m['Extreme heat'];\n  }\n  transform(b){\n    const M={\n      'Extreme heat':{heat:1,shelter:1,food:1,medical:1,power:1,ride:1},\n      'Power outage':{heat:0.5,shelter:1,food:1,medical:1.5,power:2.6,ride:0.9},\n      'Multi-crisis':{heat:1,shelter:1.1,food:1.05,medical:1.4,power:2,ride:1},\n      'Normal week':{heat:0.4,shelter:0.6,food:0.7,medical:0.7,power:0.5,ride:0.7},\n    }[this.scn()]||{};\n    const o={}; for(const k in b) o[k]=b[k]*(M[k]??1); return o;\n  }\n  sevFactor(){ return {'Extreme heat':1,'Power outage':1.2,'Multi-crisis':1.35,'Normal week':0.5}[this.scn()]||1; }\n  demoW(){\n    return {\n      all:{heat:1,shelter:1,food:1,medical:1,power:1,ride:1},\n      seniors:{heat:1.2,shelter:0.8,food:0.9,medical:1.4,power:1.3,ride:1.1},\n      families:{heat:1,shelter:1.3,food:1.4,medical:0.9,power:0.9,ride:1.1},\n      disability:{heat:1,shelter:1,food:0.9,medical:1.5,power:1.4,ride:1.3},\n    }[this.state.demo||'all'];\n  }\n  sevScaler(d){\n    const s=this.state.severity||'all';\n    if(s==='all') return 1;\n    if(s==='tier1') return 0.5;\n    if(s==='tier2') return 0.3;\n    if(s==='tier3') return 0.16;\n    if(s==='redflag'){ const tot=Object.values(d.byNeed).reduce((a,b)=>a+b,0); return tot? (d.sev/tot):0; }\n    return 1;\n  }\n  timeMult(){ return {live:1,'24h':4.2,'7d':20,'30d':72}[this.state.time||'live']; }\n  layerKey(){\n    if(this.state.layer) return this.state.layer;\n    return {'Demand volume':'volume','Unmet need':'unmet','Severity':'severity','Wait & overload':'wait'}[this.props.defaultLayer||'Unmet need']||'unmet';\n  }\n  deployed(){ return new Set(this.state.deployed||[]); }\n  servedBonus(){\n    const dep=this.deployed(); const bonus={};\n    this.recsBase().forEach(r=>{ if(dep.has(r.id)&&r.effect.dist&&r.effect.addServed){ bonus[r.effect.dist]=(bonus[r.effect.dist]||0)+r.effect.addServed; } });\n    return bonus;\n  }\n\n  metrics(d){\n    const nd=this.transform(d.byNeed);\n    const w=this.demoW();\n    const need=this.state.need||'all';\n    const rawTot=Object.values(d.byNeed).reduce((a,b)=>a+b,0);\n    let eff, share;\n    if(need!=='all'){ eff=nd[need]*w[need]; share=rawTot? (d.byNeed[need]/rawTot):0; }\n    else { eff=0; for(const k in nd) eff+=nd[k]*w[k]; share=1; }\n    eff*=this.sevScaler(d);\n    const servedShown=(d.served+(this.servedBonus()[d.id]||0))*share;\n    const unmet=Math.max(0, eff - servedShown);\n    const sevVal=d.sev*this.sevFactor()*(need==='all'?1:share);\n    return { eff, unmet, sevVal, wait:d.wait };\n  }\n  basis(d){\n    const m=this.metrics(d);\n    switch(this.layerKey()){\n      case 'volume': return m.eff;\n      case 'unmet': return m.unmet;\n      case 'severity': return m.sevVal;\n      case 'wait': return m.wait;\n      default: return m.unmet;\n    }\n  }\n\n  // centers with action effects applied (single source of truth)\n  centersEff(){\n    const dep=this.deployed();\n    const staffDone=dep.has('r2');\n    return this.base().map(d=>{\n      let cap=d.cap, wait=d.wait, staff=d.staff;\n      if(staffDone && d.id==='southwest'){ cap=82; wait=24; staff=12; }\n      if(staffDone && d.id==='westend'){  cap=70; wait=18; staff=5; }\n      const ring= cap>=90? '#D5694A' : cap>=78? '#E0A23C' : '#5A8C4A';\n      return {...d, cap, wait, staff, ring};\n    });\n  }\n\n  // ---------- handlers ----------\n  setNeed(k){ this.setState({need:k}); }\n  setTime(k){ this.setState({time:k}); }\n  setLayer(k){ this.setState({layer:k}); }\n  onSeverity(e){ this.setState({severity:e.target.value}); }\n  onDemo(e){ this.setState({demo:e.target.value}); }\n  selectMSC(id){ this.setState(s=>({selectedId: s.selectedId===id? null : id})); }\n  hoverMSC(id){ this.setState({selectedId:id}); }\n  clearSel(){ this.setState({selectedId:null}); }\n  act(id){ this.setState(s=>{ const dep=new Set(s.deployed||[]); dep.add(id); const r=this.recsBase().find(x=>x.id===id); return {deployed:[...dep], selectedId: r&&r.dist? r.dist : s.selectedId }; }); }\n\n  pillBtn(active,accent){\n    return 'display:flex;align-items:center;gap:6px;border:none;cursor:pointer;border-radius:9px;padding:8px 12px;font-family:Figtree;font-size:13px;font-weight:600;transition:all .15s;'+\n      (active? 'background:'+(accent||'#2F8F83')+';color:#fff;' : 'background:transparent;color:#6B6152;');\n  }\n  segBtn(active){\n    return 'border:none;cursor:pointer;border-radius:8px;padding:7px 12px;font-family:Figtree;font-size:12.5px;font-weight:700;transition:all .15s;'+\n      (active? 'background:#2F8F83;color:#fff;' : 'background:transparent;color:#7A7064;');\n  }\n\n  // ---------- Leaflet map ----------\n  _waitL(){\n    if(window.L && document.getElementById('hmap') && !this._map){ this._initMap(); }\n    else if(!this._map){ this._lt=setTimeout(()=>this._waitL(),120); }\n  }\n  _initMap(){\n    const L=window.L;\n    const el=document.getElementById('hmap');\n    if(!el) return;\n    const map=L.map(el,{zoomControl:true,attributionControl:true,scrollWheelZoom:true,minZoom:9,maxZoom:17}).setView([29.76,-95.40],11);\n    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{\n      attribution:'© OpenStreetMap contributors © CARTO', subdomains:'abcd', maxZoom:19\n    }).addTo(map);\n    this._map=map;\n    this._haloLayer=L.layerGroup().addTo(map);\n    this._markerLayer=L.layerGroup().addTo(map);\n    this._fitted=false;\n    this._sig='';\n    map.on('zoomend moveend', ()=>{ if(this._fitted) this._drawMap(); });\n    setTimeout(()=>{ if(this._map){ this._map.invalidateSize(); this._drawMap(); } },80);\n  }\n  componentDidUpdate(){\n    if(!this._map){ if(!this._lt) this._waitL(); return; }\n    const sig=[this.state.need,this.state.time,this.state.layer,this.state.severity,this.state.demo,this.scn(),this.state.selectedId,(this.state.deployed||[]).join(','),this.props.showGlow,this.props.reduceMotion].join('|');\n    if(sig!==this._sig){ this._sig=sig; this._map.invalidateSize(); this._drawMap(); }\n  }\n  _drawMap(){\n    try{ this._drawMapInner(); }catch(e){ console.log('DRAWMAP_ERR', e&&e.message, e&&e.stack); }\n  }\n  _drawMapInner(){\n    const L=window.L; if(!L||!this._map) return;\n    this._map.invalidateSize(false);\n    const sz=this._map.getSize();\n    if(!sz || sz.x<10 || sz.y<10){ clearTimeout(this._rt); this._rt=setTimeout(()=>this._drawMap(),160); return; }\n    if(!this._fitted){\n      this._fitted=true;\n      const pts=this.base().map(d=>[d.lat,d.lng]);\n      this._map.once('moveend zoomend viewreset', ()=>this._drawMap());\n      this._map.fitBounds(pts,{padding:[44,44],animate:false});\n      clearTimeout(this._rt); this._rt=setTimeout(()=>this._drawMap(),220);\n      return;\n    }\n    this._haloLayer.clearLayers();\n    this._markerLayer.clearLayers();\n    const cents=this.centersEff();\n    const vals=cents.map(d=>({d, v:this.basis(d)}));\n    const max=Math.max(...vals.map(x=>x.v),0.0001);\n    const sel=this.state.selectedId;\n    const showGlow=this.props.showGlow!==false;\n    const reduceMotion=!!this.props.reduceMotion;\n    const zoom=this._map.getZoom();\n    const mToPx=(m,lat)=> m / (156543.03392*Math.cos(lat*Math.PI/180)/Math.pow(2,zoom));\n    const domMarker=(lat,lng,html,layer)=>{\n      L.marker([lat,lng],{icon:L.divIcon({className:'heal-mk',html,iconSize:[0,0],iconAnchor:[0,0]}),interactive:false,keyboard:false}).addTo(layer);\n    };\n\n    vals.forEach(({d,v})=>{\n      const t=Math.max(0,Math.min(1,v/max));\n      const c=this.ramp(t);\n      if(showGlow){\n        const rpx=Math.max(14,mToPx(900+t*4200,d.lat));\n        const halo='<div style=\"position:absolute;transform:translate(-50%,-50%);width:'+(rpx*2)+'px;height:'+(rpx*2)+'px;border-radius:50%;background:radial-gradient(circle,'+this.rgba(c,0.10+t*0.34)+' 0%,'+this.rgba(c,0.05+t*0.20)+' 50%,rgba(0,0,0,0) 72%);pointer-events:none;\"><\u002Fdiv>';\n        domMarker(d.lat,d.lng,halo,this._haloLayer);\n      }\n      if(sel===d.id){\n        const srpx=Math.max(26,mToPx(1700,d.lat));\n        const ring='<div style=\"position:absolute;transform:translate(-50%,-50%);width:'+(srpx*2)+'px;height:'+(srpx*2)+'px;border-radius:50%;border:2px dashed #2F8F83;pointer-events:none;\"><\u002Fdiv>';\n        domMarker(d.lat,d.lng,ring,this._markerLayer);\n      }\n      const val=Number.isFinite(v)? Math.round(v):0;\n      const valColor=this.hex(this.ramp(Math.min(1,t+0.15)));\n      const selected=sel===d.id;\n      const html='<div style=\"position:absolute;transform:translate(-50%,-50%);\">'+\n        '<div style=\"position:relative;width:34px;height:34px;border-radius:50%;background:#fff;border:'+(selected?4:3)+'px solid '+d.ring+';box-shadow:0 2px 8px rgba(0,0,0,.30);display:flex;align-items:center;justify-content:center;font:800 12px Figtree;color:'+valColor+';\">'+val+\n          '<div style=\"position:absolute;bottom:38px;left:50%;transform:translateX(-50%);white-space:nowrap;font:700 11px Figtree;color:#3A332A;text-shadow:0 0 3px #fff,0 1px 2px #fff,0 0 7px #fff,1px 0 3px #fff;\">'+d.short+'<\u002Fdiv>'+\n        '<\u002Fdiv><\u002Fdiv>';\n      const icon=L.divIcon({className:'heal-mk',html,iconSize:[0,0],iconAnchor:[0,0]});\n      const m=L.marker([d.lat,d.lng],{icon,riseOnHover:true});\n      m.on('click',()=>this.selectMSC(d.id));\n      m.addTo(this._markerLayer);\n    });\n\n    // mobile units: baseline Kashmere + any deployed unit recs\n    const addUnit=(dist,isNew)=>{\n      const g=this.byId(dist); if(!g) return;\n      const pulse=(isNew&&!reduceMotion)? '<div style=\"position:absolute;inset:-4px;border-radius:8px;border:2px solid #2F8F83;animation:heal-pulse 2s ease-out infinite;\"><\u002Fdiv>':'';\n      const html='<div style=\"position:absolute;transform:translate(-50%,-50%);\"><div style=\"position:relative;width:24px;height:24px;\">'+pulse+\n        '<div style=\"position:absolute;inset:0;border-radius:7px;background:#2F8F83;transform:rotate(45deg);box-shadow:0 2px 6px rgba(0,0,0,.32);\"><\u002Fdiv>'+\n        '<div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font:800 9px Figtree;color:#fff;\">MU<\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n      const icon=L.divIcon({className:'heal-mk',html,iconSize:[0,0],iconAnchor:[0,0]});\n      L.marker([g.lat+0.010,g.lng+0.006],{icon}).addTo(this._markerLayer);\n    };\n    addUnit('kashmere',false);\n    this.recsBase().forEach(r=>{ if(this.deployed().has(r.id)&&r.effect.unit) addUnit(r.effect.dist,true); });\n  }\n\n  renderVals(){\n    const layerKey=this.layerKey();\n    const sel=this.state.selectedId;\n    const cents=this.centersEff();\n    const overCount=cents.filter(c=>c.cap>=90).length;\n\n    // KPIs\n    const tm=this.timeMult();\n    const sumEff=cents.reduce((a,d)=>a+this.metrics(d).eff,0);\n    const sumUnmet=cents.reduce((a,d)=>a+this.metrics(d).unmet,0);\n    const avgWait=Math.round(cents.reduce((a,c)=>a+c.wait,0)/cents.length);\n    const served=Math.round(cents.reduce((a,d)=>a+d.served,0)*3.05);\n    const timeLabel={live:'right now','24h':'last 24h','7d':'last 7 days','30d':'last 30 days'}[this.state.time||'live'];\n    const kpis=[\n      {label:'Active cases', value:Math.round(sumEff*tm).toLocaleString(), trend:'↑ 18%', trendColor:'#C24A2A', sub:timeLabel, color:'#2A2520'},\n      {label:'Unmet need', value:Math.round(sumUnmet).toLocaleString(), trend: sumUnmet<180?'↓':'↑ 31%', trendColor: sumUnmet<180?'#5A8C4A':'#C24A2A', sub:'residents waiting', color:'#9E2B1E'},\n      {label:'Centers over capacity', value:String(overCount), trend: overCount<2?'↓':'', trendColor:'#5A8C4A', sub:'of 12 MSCs', color: overCount>=2?'#D5694A':'#2A2520'},\n      {label:'Avg wait', value:avgWait+' min', trend: avgWait<24?'↓':'↑', trendColor: avgWait<24?'#5A8C4A':'#C24A2A', sub:'across all centers', color:'#2A2520'},\n      {label:'People served today', value:served.toLocaleString(), trend:'↑ 9%', trendColor:'#5A8C4A', sub:'cumulative', color:'#2F8F83'},\n    ];\n\n    // filters UI\n    const need=this.state.need||'all';\n    const needDefs=[\n      {k:'all',label:'All needs',icon:'M12 3 2 8l10 5 10-5-10-5ZM2 13l10 5 10-5'},\n      {k:'heat',label:'Heat',icon:'M12 8a4 4 0 100 8 4 4 0 000-8Zm0-6v2m0 16v2M4 12H2m20 0h-2M5.6 5.6 4.2 4.2m15.6 15.6-1.4-1.4M5.6 18.4 4.2 19.8M19.8 4.2l-1.4 1.4'},\n      {k:'shelter',label:'Shelter',icon:'M4 11 12 4l8 7M6 10v9h12v-9'},\n      {k:'food',label:'Food',icon:'M7 3v8m-2-8v8m4-8v8M7 11v10M17 3c-1.4 0-2.4 2-2.4 5s.9 4 2.4 4v9'},\n      {k:'medical',label:'Medical',icon:'M12 5v14M5 12h14'},\n      {k:'power',label:'Power',icon:'M13 3 4 14h7l-1 7 9-11h-7z'},\n      {k:'ride',label:'Ride',icon:'M5 16v-3l2-5h10l2 5v3M5 16h14M7 16v2m10-2v2'},\n    ];\n    const needAccent={heat:'#D5694A',shelter:'#2F8F83',food:'#C28A2A',medical:'#9E2B1E',power:'#C28A2A',ride:'#2F8F83'};\n    const needs=needDefs.map(n=>({ label:n.label, icon:n.icon, style:this.pillBtn(need===n.k, needAccent[n.k]), onClick:()=>this.setNeed(n.k) }));\n\n    const time=this.state.time||'live';\n    const times=[['live','Live'],['24h','24h'],['7d','7d'],['30d','30d']].map(([k,l])=>({ label:l, style:this.segBtn(time===k), onClick:()=>this.setTime(k) }));\n\n    const layerDefs=[['volume','Demand'],['unmet','Unmet need'],['severity','Severity'],['wait','Wait']];\n    const layers=layerDefs.map(([k,l])=>({ label:l, style:this.segBtn(layerKey===k), onClick:()=>this.setLayer(k) }));\n    const layerTitle={volume:'Demand density',unmet:'Unmet need',severity:'Red-flag severity',wait:'Wait & overload'}[layerKey];\n    const layerUnit={volume:'active cases',unmet:'residents unmet',severity:'red-flag cases',wait:'minute wait'}[layerKey];\n    const mapSub='Halo + dot value shows '+layerUnit+(need!=='all'? ' · '+needDefs.find(n=>n.k===need).label.toLowerCase()+' only':'')+' · click a center';\n    const legendLow={volume:'Quiet',unmet:'Covered',severity:'Stable',wait:'Short'}[layerKey];\n    const legendHigh={volume:'Surging',unmet:'Critical gap',severity:'Acute',wait:'Backed up'}[layerKey];\n    const mapBadge='12 Multi-Service Centers · '+this.scenInfo().label;\n\n    // detail panel\n    let detail=null, detailName='', detailMeta='', detailBars=[], detailNote='';\n    if(sel){ const d=cents.find(b=>b.id===sel); if(d){\n      detail=true; detailName=d.name;\n      const nd=this.transform(d.byNeed);\n      const m=this.metrics(d);\n      const maxNeed=Math.max(...Object.values(nd));\n      const nl={heat:'Heat',shelter:'Shelter',food:'Food',medical:'Medical',power:'Power',ride:'Ride'};\n      const nc={heat:'#D5694A',shelter:'#2F8F83',food:'#C28A2A',medical:'#9E2B1E',power:'#E0A23C',ride:'#5A8C4A'};\n      detailBars=Object.keys(nd).map(k=>({ label:nl[k], val:Math.round(nd[k]), pct:((nd[k]/maxNeed)*100).toFixed(0)+'%', color:nc[k] }));\n      detailMeta=Math.round(m.eff)+' active · '+Math.round(m.unmet)+' unmet · '+Math.round(d.sev)+' red-flag';\n      detailNote='Center at '+d.cap+'% capacity · '+d.wait+' min wait · '+d.staff+' staff on shift.';\n    }}\n\n    // recs\n    const tierColor={Critical:'#9E2B1E',High:'#D5694A',Medium:'#C28A2A'};\n    const recs=this.recsBase().map(r=>{\n      const done=this.deployed().has(r.id);\n      const bn=this.byId(r.dist);\n      return {\n        tier:r.tier, tierColor:tierColor[r.tier], districtName:bn?bn.name:'',\n        title:r.title, reason:r.reason,\n        deltas:r.deltas.map(t=>({t})),\n        cardStyle:'border:1px solid '+(sel===r.dist?'#2F8F83':'#EDE5D6')+';border-radius:16px;padding:15px 16px;transition:border-color .15s;background:'+(done?'#F4F8F5':'#fff')+';',\n        btnLabel: done? r.done : r.btn,\n        btnStyle:'margin-top:13px;width:100%;border:none;cursor:'+(done?'default':'pointer')+';border-radius:11px;padding:11px;font-family:Figtree;font-size:13.5px;font-weight:700;transition:all .15s;'+\n          (done? 'background:#E6F0EC;color:#2F6F66;' : 'background:#2F8F83;color:#fff;'),\n        onAct: done? ()=>{} : ()=>this.act(r.id),\n        onHover:()=>this.hoverMSC(r.dist),\n      };\n    });\n\n    const centerCards=cents.map(c=>({\n      name:c.name, cap:c.cap, capW:Math.min(100,c.cap)+'%', ring:c.ring, wait:c.wait, staff:c.staff,\n      cardStyle:'flex:none;width:182px;background:'+(sel===c.id?'#F6EFE3':'#fff')+';border:1px solid '+(sel===c.id?'#2F8F83':'#E7E0D4')+';border-radius:15px;padding:14px 15px;cursor:pointer;transition:all .15s;',\n      onClick:()=>this.selectMSC(c.id),\n    }));\n\n    const si=this.scenInfo();\n\n    return {\n      clock:this.state.now.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'}),\n      blinkAnim: this.props.reduceMotion? 'none' : 'heal-blink 1.8s ease-in-out infinite',\n      scenarioIcon:si.icon, scenarioLabel:si.label, scenarioSub:si.sub, scenarioBg:si.bg, scenarioBorder:si.border, scenarioInk:si.ink,\n      needs, times, layers, kpis,\n      severity:this.state.severity||'all', demo:this.state.demo||'all',\n      onSeverity:(e)=>this.onSeverity(e), onDemo:(e)=>this.onDemo(e),\n      layerTitle, mapSub, mapBadge, legendLow, legendHigh,\n      recs, overCount, centerCards,\n      detail, detailName, detailMeta, detailBars, detailNote,\n      clearSel:()=>this.clearSel(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"HEAL Manager.dc"}
